<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let arr = [10, 20, 30, 40, 50, 60]
        let arr1 = ["java", 500, true, { name: "sai" }, null, () => { }]

        console.log(arr);
        console.log(arr1);

        let arr3 = new Array(10, 'javascript', true)
        console.log(arr3);


        for (let i = 0; i < arr.length; i++) {
            console.log(arr[i]);
        }


        let str = "java"
        //for-in  loop
        for (index in str) {
            console.log(index);
        }

        //for-of loop

        for (val of str) {
            console.log(val);
        }


        //forEach() loop 
        arr.forEach((val, ind, a) => {
            console.log(val, ind, a);
        })




        let productPrices = [1000, 500, 450, 900, 5000, 4500, 2500];

        console.log(productPrices);

        //1000 to 4000
        let filterPrices = productPrices.filter((x) => {
            return x >= 1000 && x <= 4000
        })
        console.log(filterPrices);

        let discountedPrices = productPrices.map((x) => {
            return x - x / 10;

        })

        console.log(discountedPrices);
        //[1000, 2500]

        let filterProductTotalPrice = filterPrices.reduce((x, acc) => {
            return x + acc;
        })

        console.log(filterProductTotalPrice);



    </script>
</body>

</html>
